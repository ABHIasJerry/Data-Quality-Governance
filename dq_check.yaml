5:
  query: "CREATE OR REPLACE FUNCTION public.delete_cascade_speed_and_work_prefs() RETURNS trigger
LANGUAGE plpgsql
        AS $$
                BEGIN
                        DELETE FROM preferences.speed_preferences sp WHERE sp.vehicle_implement_config_id = OLD.id ;
                        DELETE FROM preferences.work_preferences wp WHERE wp.vehicle_implement_config_id = OLD.id ;
                        RETURN NULL;
                END;
        $$;"
  verify:
    - "@function[exist]":
        schema: public
        function name: delete_cascade_speed_and_work_prefs
        return type: trigger
        language: plpgsql


7:
  query: "CREATE TRIGGER tg_delete_speed_and_work_prefs AFTER DELETE ON public.vehicle_implement_config FOR EACH ROW EXECUTE PROCEDURE public.delete_cascade_speed_and_work_prefs();
"
  verify:
    - "@trigger[exist]":
        schema: public
        trigger name: tg_delete_speed_and_work_prefs
        event table: vehicle_implement_config
        event: DELETE
        action orientation: ROW
        action timing: AFTER
        execution statement: EXECUTE PROCEDURE delete_cascade_speed_and_work_prefs()

