---
1:
  query: "
  DO
  $$
  BEGIN
          IF EXISTS (SELECT column_name FROM information_schema.columns
                  WHERE table_schema = 'public'
                  AND table_name = 'speed_source'
                  AND column_name = 'present')
          THEN
  		ALTER TABLE public.speed_source ALTER COLUMN present SET NOT NULL;
  	ELSE
  		RAISE NOTICE 'Column ''%'' missing from table ''%''','present','public.speed_source';
  	END IF;
  END; $$;
  "
  verify:
    - "@column[properties]":
        schema: public
        table name: speed_source
        column name: present
        properties:
          - is_nullable: 'NO'

